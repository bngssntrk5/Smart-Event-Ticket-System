<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş / Kayıt - Bilet Sistemi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .auth-box {
            flex: 1;
            max-width: 420px;
        }

        .auth-box h2 {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dce1e7;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .divider {
            width: 1px;
            background-color: #ecf0f1;
            margin: 0 10px;
        }

        .error-msg {
            background-color: #ffebee;
            color: #c62828;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bilet Sistemi</h1>
        <p>Devam etmek için giriş yapın veya yeni hesap oluşturun.</p>

        <div class="auth-wrapper">

            <!-- Giriş Formu (Login Form) -->
            <div class="auth-box">
                <h2>Giriş Yap</h2>

                {% if error %}
                    <div class="error-msg">{{ error }}</div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" name="email" placeholder="ornek@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Şifre:</label>
                        <input type="password" name="password" placeholder="Şifrenizi girin" required>
                    </div>
                    <button type="submit" class="buy-ticket-btn" style="width: 100%; padding: 10px;">Giriş Yap</button>
                </form>
            </div>

            <div class="divider"></div>

            <!-- Kayıt Formu (Register Form) -->
            <div class="auth-box">
                <h2>Yeni Kayıt</h2>

                {% if reg_error %}
                    <div class="error-msg">{{ reg_error }}</div>
                {% endif %}

                <form action="/register" method="POST">
                    <div class="form-group">
                        <label>Kullanıcı Adı:</label>
                        <input type="text" name="name" placeholder="Kullanıcı adınız" required>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" name="email" placeholder="ornek@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Şifre:</label>
                        <input type="password" name="password" placeholder="En az 6 karakter" required>
                    </div>
                    <button type="submit" class="buy-ticket-btn" style="width: 100%; padding: 10px;">Kayıt Ol</button>
                </form>
            </div>

        </div>
    </div>
</body>
</html>
