<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SmartEvent | Authentication</title>
    <style>
      :root {
        --primary: #4361ee;
        --bg: #f8f9fa;
        --text: #2b2d42;
      }
      body {
        background: var(--bg);
        font-family: "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .auth-container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 800px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
      }
      h2 {
        color: var(--text);
        margin-top: 0;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #64748b;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        box-sizing: border-box;
        transition: 0.3s;
      }
      input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn:hover {
        background: #3f37c9;
        transform: translateY(-2px);
      }
      .divider {
        width: 1px;
        background: #eee;
      }
      .error-msg {
        color: #f72585;
        font-size: 0.85rem;
        margin-bottom: 10px;
      }
      @media (max-width: 600px) {
        .auth-container {
          grid-template-columns: 1fr;
        }
        .divider {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h2>Login</h2>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('login_page') }}" method="POST">
          <div class="form-group">
            <label>Email</label><input type="email" name="email" required />
          </div>
          <div class="form-group">
            <label>Password</label
            ><input type="password" name="password" required />
          </div>
          <button type="submit" class="btn">Sign In</button>
        </form>
      </div>
      <div class="divider"></div>
      <div class="auth-box">
        <h2>Register</h2>
        {% if reg_error %}
        <div class="error-msg">{{ reg_error }}</div>
        {% endif %}
        <form action="{{ url_for('register_page') }}" method="POST">
          <div class="form-group">
            <label>Full Name</label><input type="text" name="name" required />
          </div>
          <div class="form-group">
            <label>Email</label><input type="email" name="email" required />
          </div>
          <div class="form-group">
            <label>Password</label
            ><input type="password" name="password" required />
          </div>
          <button type="submit" class="btn" style="background: #4cc9f0">
            Create Account
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
