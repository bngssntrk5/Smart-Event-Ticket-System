<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Event | SmartEvent</title>
    <style>
      :root {
        --primary: #4361ee;
        --bg: #f8f9fa;
      }
      body {
        background: var(--bg);
        font-family: "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .form-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      h2 {
        margin-bottom: 25px;
        color: #2b2d42;
        text-align: center;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #64748b;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .btn-save {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        font-size: 1rem;
      }
      .btn-save:hover {
        background: #3f37c9;
        box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
      }
      .back-btn {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #8d99ae;
        text-decoration: none;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="form-card">
      <h2>➕ New Event</h2>
      <form action="{{ url_for('create_event') }}" method="POST">
        <div class="form-group">
          <label>Event Name</label>
          <input
            type="text"
            name="event_name"
            placeholder="e.g. AI Conference 2026"
            required
          />
        </div>
        <div class="form-group">
          <label>Maximum Capacity</label>
          <input
            type="number"
            name="capacity"
            placeholder="e.g. 150"
            required
          />
        </div>
        <button type="submit" class="btn-save">Create Event Now</button>
      </form>
      <a href="/" class="back-btn">Cancel and Return</a>
    </div>
  </body>
</html>
