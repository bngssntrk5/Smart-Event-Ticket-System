<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Occupancy Report</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body
    style="background-color: #f8f9fa; font-family: sans-serif; padding: 40px"
  >
    <div
      style="
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        "
      >
        <h1 style="color: #2b2d42">📊 Occupancy Analysis</h1>
        <a
          href="{{ url_for('index') }}"
          style="text-decoration: none; color: #4361ee; font-weight: bold"
          >← Dashboard</a
        >
      </div>

      <table style="width: 100%; border-collapse: collapse">
        <thead>
          <tr style="background: #f1f5f9">
            <th style="padding: 15px; text-align: left">Event Name</th>
            <th style="padding: 15px; text-align: left">Capacity</th>
            <th style="padding: 15px; text-align: left">Sold</th>
            <th style="padding: 15px; text-align: left">Rate</th>
            <th style="padding: 15px; text-align: left">Action</th>
          </tr>
        </thead>
        <tbody>
          {% for item in report %}
          <tr style="border-bottom: 1px solid #eee">
            <td style="padding: 15px"><strong>{{ item.event }}</strong></td>
            <td style="padding: 15px">{{ item.capacity }}</td>
            <td style="padding: 15px">{{ item.sold }}</td>
            <td style="padding: 15px">
              <span
                style="
                  background: #e2e8f0;
                  padding: 5px 10px;
                  border-radius: 5px;
                "
                >%{{ item.rate }}</span
              >
            </td>
            <td style="padding: 15px">
              <button
                class="buy-ticket-btn"
                data-type="{{ item.event }}"
                data-id="{{ loop.index }}"
                style="
                  background: #4361ee;
                  color: white;
                  border: none;
                  padding: 8px 15px;
                  border-radius: 5px;
                  cursor: pointer;
                "
              >
                Buy Ticket
              </button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <script src="{{ url_for('static', filename='js/tickets.js') }}"></script>
  </body>
</html>
